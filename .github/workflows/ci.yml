name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  norminette-formatting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install norminette package
        run: |
          pip install --upgrade pip
          pip install norminette

      - name: Run norminette formatting check
        run: |
          # Run norminette normally to output human-readable style warnings/errors in the logs
          python -m norminette src/*.c src/*.h || true
          
          # Fetch JSON output and count Errors and Notices using bash tools
          OUTPUT=$(python -m norminette -f json src/*.c src/*.h)
          ERRORS=$(echo "$OUTPUT" | grep -o '"level":"Error"' | wc -l)
          NOTICES=$(echo "$OUTPUT" | grep -o '"level":"Notice"' | wc -l)
          
          echo "========================================"
          echo "Norminette Summary:"
          echo "  Errors:  $ERRORS"
          echo "  Notices: $NOTICES"
          echo "========================================"
          
          if [ "$ERRORS" -ne 0 ]; then
            exit 1
          fi

  verify-correctness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python deps (if present)
        run: |
          if [ -f python_solver/requirements.txt ]; then
            pip install --upgrade pip
            pip install -r python_solver/requirements.txt
          fi

      - name: Build (make re)
        run: make re

      - name: Run consistency verification
        run: python python_scripts/verify_consistency.py
